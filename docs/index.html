<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ClaudeStatus</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 640px; margin: 4em auto; padding: 0 1.5em; color: #333; line-height: 1.5; }
    h1 { font-weight: 600; }
    .badge { display: inline-block; padding: 0.4em 1em; background: #000; color: #f80; border-radius: 6px; text-decoration: none; }
    .badge:hover { background: #222; }
    code { background: #f4f4f4; padding: 0.1em 0.4em; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>ClaudeStatus</h1>
  <p>A floating-window macOS app and WidgetKit widget showing your Claude usage limits in real time.</p>
  <p><a class="badge" href="https://github.com/Photojourna1ist/ClaudeStatus/releases/latest">Download latest</a></p>
  <p>The app auto-updates via Sparkle. The feed lives at <code>/appcast.xml</code>.</p>
  <p><a href="https://github.com/Photojourna1ist/ClaudeStatus">Source on GitHub</a></p>
</body>
</html>
